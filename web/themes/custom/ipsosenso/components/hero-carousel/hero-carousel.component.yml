"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Hero Carousel
group: IpsoSenso
status: stable
description: "Hero plein écran avec image de fond et carrousel scalable. Ajoutez des composants Hero Slide dans le slot."
props:
  type: object
  properties:
    autoplay:
      type: integer
      title: "Délai autoplay (ms)"
      default: 5000
      examples:
        - 5000
slots:
  slides:
    title: "Slides"
    description: "Glissez des composants Hero Slide ici."
libraryOverrides:
  js:
    hero-carousel.js:
      preprocess: false
      attributes:
        type: module
